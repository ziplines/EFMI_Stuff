; WIP Fog Removal and Unlit Shaders for 1.3


[Constants]
global $RCEF = 0

[KeyRCEF]
key = page_down
type = cycle
$RCEF = 0,1,2

; Overrides ---------------------------

[ShaderOverride_Hook]
; This is an irrelevant shader that is always present (UI hash)
; It's only here for the mod to hook into shader loading and apply the xy186 values
hash = 2b58d932af001aef
allow_duplicate_hash = true
x186 = $RCEF == 1
y186 = $RCEF == 2

[ShaderOverride_RemoveVolumetricClouds]
hash = 14e6c42494051eb8
allow_duplicate_hash = true
run = CommandListWhenEnabled

[ShaderOverride_SunGlare]
hash = 9d06cd2e06944deb
allow_duplicate_hash = true
run = CommandListWhenEnabled

; CommandList -------------------------

[CommandListWhenEnabled]
if $RCEF != 0
	handling = skip
endif